fu:
  authentication:
    token-timeout: 300
    not-authentication:
      - 'POST:/login'
      - 'POST:/logout'

server:
  port: 81

spring:
  application:
    name: '@artifactId@'
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  task:
    execution:
      pool:
        core-size: 8
        max-size: 160
        queue-capacity: 1000
        keep-alive: 60
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/spring_boot_demo?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password: 12345678